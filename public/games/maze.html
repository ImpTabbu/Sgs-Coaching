<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maze Puzzle Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --primary-color: #00ff88;
        --primary-hover: #00cc6a;
        --bg-color: #0a0a0a;
        --text-color: #ffffff;
        --card-bg: #1a1a1a;
        --border-color: #333;
        --gradient-start: #1a1a1a;
        --gradient-end: #0a0a0a;
        --shadow-color: rgba(0, 255, 136, 0.2);
      }

      .sidebar-container.sidebar-invisible {
        display: none;
      }

      .Blog .blog-posts .post-outer-container:last-child {
        background: #191919;
        border-radius: 20px;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: var(--bg-color);
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text-color);
        line-height: 1.6;
        touch-action: none;
        overflow: hidden;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 20px;
        width: 100%;
        max-width: 800px;
      }

      canvas {
        background: transparent;
        border: 2px solid var(--primary-color);
        border-radius: 15px;
        max-width: 100%;
        height: auto;
      }

      .game-info {
        display: flex;
        gap: 10px;
        width: 100%;
        justify-content: center;
        margin-bottom: 10px;
      }

      .game-info p {
        background: transparent;
        border: 2px solid var(--primary-color);
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 16px;
        color: var(--primary-color);
      }

      button {
        padding: 15px 30px;
        font-size: 16px;
        background: var(--primary-color);
        color: #000;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        font-weight: bold;
        letter-spacing: 1px;
        touch-action: manipulation;
        width: 100%;
        max-width: 300px;
      }

      button:active {
        transform: scale(0.95);
        background: var(--primary-hover);
      }

      /* Mobile Controls */
      .mobile-controls {
        display: none;
        grid-template-areas:
          ". up ."
          "left . right"
          ". down .";
        gap: 1px;
        margin-top: 10px;
      }

      .mobile-controls button {
        width: 60px;
        height: 60px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        background: var(--primary-color);
        border: none;
        border-radius: 12px;
      }

      .mobile-controls button:active {
        background: var(--primary-hover);
      }

      .up {
        grid-area: up;
      }
      .down {
        grid-area: down;
      }
      .left {
        grid-area: left;
      }
      .right {
        grid-area: right;
      }

      /* Popup Styles */
      .popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: var(--card-bg);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        text-align: center;
        z-index: 1001;
        border: 2px solid var(--primary-color);
        width: 90%;
        max-width: 400px;
      }

      .popup h2 {
        margin-bottom: 20px;
        color: var(--primary-color);
        font-size: 24px;
      }

      .hidden {
        display: none;
      }

      /* Mobile Responsiveness */
      @media (max-width: 768px) {
        .container {
          margin-top: 20px;
          gap: 1px;
        }

        .mobile-controls {
          display: grid;
        }

        canvas {
          max-height: 45vh;
          margin-bottom: 10px;
        }

        .game-info {
          flex-direction: row;
          justify-content: space-between;
          margin-bottom: 5px;
        }

        .game-info p {
          font-size: 14px;
          padding: 8px 15px;
        }
      }
      
      .copyright {
        position: absolute;
        bottom: 10px;
        left: 0;
        width: 100%;
        text-align: center;
        font-size: 12px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="game-info">
        <p id="level-display">Level: 1</p>
        <p id="timer">Time: 0s</p>
      </div>
      <canvas id="mazeCanvas"></canvas>
      <button id="startGame">Start Game</button>
      <div class="mobile-controls">
        <button class="up">↑</button>
        <button class="left">←</button>
        <button class="right">→</button>
        <button class="down">↓</button>
      </div>
    </div>
    <div class="copyright">© SGS Coaching</div>

    <div id="winPopup" class="popup hidden">
      <h2>Level Complete! 🎉</h2>
      <p id="winMessage"></p>
      <button id="nextLevel">Continue</button>
    </div>
    <div id="gameCompletePopup" class="popup hidden">
      <h2>Congratulations! 🏆</h2>
      <p>You've completed all levels!</p>
      <button id="playAgain">Play Again</button>
    </div>
    <div id="gameOverPopup" class="popup game-over hidden">
      <h2>Game Over! 💔</h2>
      <p>Time's up! Better luck next time.</p>
      <div class="timer-display">
        <span id="finalTimeDisplay"></span>
      </div>
      <button id="tryAgain">Try Again</button>
    </div>

    <script>
      class MazeGame {
        constructor(canvas) {
          this.canvas = canvas;
          this.ctx = canvas.getContext("2d");
          this.resizeCanvas();
          this.size = 15;
          this.cellSize =
            Math.min(this.canvas.width, this.canvas.height) / this.size;
          this.playerPos = { x: 0, y: 0 };
          this.maze = [];
          this.startTime = null;
          this.timerInterval = null;
          this.currentLevel = 1;
          this.timeLimits = {
            1: 60,
            2: 55,
            3: 50,
          };
          this.timeLimit = this.timeLimits[1];

          this.initializeMaze();
          this.generateMaze(0, 0);
          this.setupControls();

          window.addEventListener("resize", () => {
            this.resizeCanvas();
            this.cellSize =
              Math.min(this.canvas.width, this.canvas.height) / this.size;
            this.drawMaze();
          });
        }

        resizeCanvas() {
          const container = this.canvas.parentElement;
          const maxSize = Math.min(
            container.clientWidth - 40,
            window.innerHeight * 0.5,
          );
          this.canvas.width = maxSize;
          this.canvas.height = maxSize;
        }

        setupControls() {
          document.addEventListener("keydown", (e) => this.handleKeyPress(e));

          const buttons = document.querySelectorAll(".mobile-controls button");
          buttons.forEach((button) => {
            button.addEventListener("touchstart", (e) => {
              e.preventDefault();
              this.handleMobileControl(button.className);
            });
          });

          let touchStartX = 0;
          let touchStartY = 0;

          this.canvas.addEventListener("touchstart", (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
          });

          this.canvas.addEventListener("touchmove", (e) => {
            e.preventDefault();
          });

          this.canvas.addEventListener("touchend", (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
              if (deltaX > 50) this.handleMobileControl("right");
              else if (deltaX < -50) this.handleMobileControl("left");
            } else {
              if (deltaY > 50) this.handleMobileControl("down");
              else if (deltaY < -50) this.handleMobileControl("up");
            }
          });

          document.getElementById("nextLevel").addEventListener("click", () => {
            document.getElementById("winPopup").classList.add("hidden");
            this.currentLevel++;
            document.getElementById("level-display").textContent =
              `Level: ${this.currentLevel}`;
            this.timeLimit = this.timeLimits[this.currentLevel];
            this.start();
          });

          document.getElementById("playAgain").addEventListener("click", () => {
            document
              .getElementById("gameCompletePopup")
              .classList.add("hidden");
            this.currentLevel = 1;
            document.getElementById("level-display").textContent = "Level: 1";
            this.timeLimit = this.timeLimits[1];
            this.start();
          });

          document.getElementById("tryAgain").addEventListener("click", () => {
            document.getElementById("gameOverPopup").classList.add("hidden");
            this.start();
          });
        }

        handleMobileControl(direction) {
          if (!this.startTime) return;

          const currentCell = this.maze[this.playerPos.y][this.playerPos.x];
          let moved = false;

          switch (direction) {
            case "up":
              if (!currentCell.walls[0] && this.playerPos.y > 0) {
                this.playerPos.y--;
                moved = true;
              }
              break;
            case "right":
              if (!currentCell.walls[1] && this.playerPos.x < this.size - 1) {
                this.playerPos.x++;
                moved = true;
              }
              break;
            case "down":
              if (!currentCell.walls[2] && this.playerPos.y < this.size - 1) {
                this.playerPos.y++;
                moved = true;
              }
              break;
            case "left":
              if (!currentCell.walls[3] && this.playerPos.x > 0) {
                this.playerPos.x--;
                moved = true;
              }
              break;
          }

          if (moved) {
            this.drawMaze();
            this.checkWin();
          }
        }

        initializeMaze() {
          this.maze = [];
          for (let i = 0; i < this.size; i++) {
            this.maze[i] = [];
            for (let j = 0; j < this.size; j++) {
              this.maze[i][j] = {
                visited: false,
                walls: [true, true, true, true],
              };
            }
          }
        }

        generateMaze(x, y) {
          this.maze[y][x].visited = true;
          const directions = [
            [0, -1],
            [1, 0],
            [0, 1],
            [-1, 0],
          ];
          directions.sort(() => Math.random() - 0.5);

          for (const [dx, dy] of directions) {
            const newX = x + dx;
            const newY = y + dy;

            if (
              newX >= 0 &&
              newX < this.size &&
              newY >= 0 &&
              newY < this.size &&
              !this.maze[newY][newX].visited
            ) {
              if (dx === 1) {
                this.maze[y][x].walls[1] = false;
                this.maze[newY][newX].walls[3] = false;
              } else if (dx === -1) {
                this.maze[y][x].walls[3] = false;
                this.maze[newY][newX].walls[1] = false;
              } else if (dy === 1) {
                this.maze[y][x].walls[2] = false;
                this.maze[newY][newX].walls[0] = false;
              } else if (dy === -1) {
                this.maze[y][x].walls[0] = false;
                this.maze[newY][newX].walls[2] = false;
              }
              this.generateMaze(newX, newY);
            }
          }
        }

        drawMaze() {
          this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

          this.ctx.strokeStyle = "#00ff88";
          this.ctx.lineWidth = 2;

          for (let y = 0; y < this.size; y++) {
            for (let x = 0; x < this.size; x++) {
              const cell = this.maze[y][x];
              const startX = x * this.cellSize;
              const startY = y * this.cellSize;

              this.ctx.beginPath();
              if (cell.walls[0]) {
                this.ctx.moveTo(startX, startY);
                this.ctx.lineTo(startX + this.cellSize, startY);
              }
              if (cell.walls[1]) {
                this.ctx.moveTo(startX + this.cellSize, startY);
                this.ctx.lineTo(startX + this.cellSize, startY + this.cellSize);
              }
              if (cell.walls[2]) {
                this.ctx.moveTo(startX, startY + this.cellSize);
                this.ctx.lineTo(startX + this.cellSize, startY + this.cellSize);
              }
              if (cell.walls[3]) {
                this.ctx.moveTo(startX, startY);
                this.ctx.lineTo(startX, startY + this.cellSize);
              }
              this.ctx.stroke();
            }
          }

          // Draw start and end points
          this.ctx.fillStyle = "#00ff88";
          this.ctx.beginPath();
          this.ctx.arc(
            this.cellSize / 2,
            this.cellSize / 2,
            this.cellSize / 4,
            0,
            Math.PI * 2,
          );
          this.ctx.fill();

          this.ctx.fillStyle = "#ff3366";
          this.ctx.beginPath();
          this.ctx.arc(
            this.canvas.width - this.cellSize / 2,
            this.canvas.height - this.cellSize / 2,
            this.cellSize / 4,
            0,
            Math.PI * 2,
          );
          this.ctx.fill();

          // Draw player
          const x = this.playerPos.x * this.cellSize + this.cellSize / 2;
          const y = this.playerPos.y * this.cellSize + this.cellSize / 2;

          this.ctx.fillStyle = "#00ffff";
          this.ctx.beginPath();
          this.ctx.arc(x, y, this.cellSize / 3, 0, Math.PI * 2);
          this.ctx.fill();
        }

        handleKeyPress(e) {
          if (!this.startTime) return;

          const key = e.key;
          const currentCell = this.maze[this.playerPos.y][this.playerPos.x];
          let moved = false;

          switch (key) {
            case "ArrowUp":
              if (!currentCell.walls[0] && this.playerPos.y > 0) {
                this.playerPos.y--;
                moved = true;
              }
              break;
            case "ArrowRight":
              if (!currentCell.walls[1] && this.playerPos.x < this.size - 1) {
                this.playerPos.x++;
                moved = true;
              }
              break;
            case "ArrowDown":
              if (!currentCell.walls[2] && this.playerPos.y < this.size - 1) {
                this.playerPos.y++;
                moved = true;
              }
              break;
            case "ArrowLeft":
              if (!currentCell.walls[3] && this.playerPos.x > 0) {
                this.playerPos.x--;
                moved = true;
              }
              break;
          }

          if (moved) {
            this.drawMaze();
            this.checkWin();
          }
        }

        checkWin() {
          if (
            this.playerPos.x === this.size - 1 &&
            this.playerPos.y === this.size - 1
          ) {
            clearInterval(this.timerInterval);
            const endTime = (Date.now() - this.startTime) / 1000;

            if (this.currentLevel < 3) {
              this.showLevelComplete(endTime);
            } else {
              this.showGameComplete(endTime);
            }
          }
        }

        showLevelComplete(timeElapsed) {
          const popup = document.getElementById("winPopup");
          const message = document.getElementById("winMessage");
          message.textContent = `You completed Level ${this.currentLevel} in ${timeElapsed.toFixed(1)} seconds!`;
          popup.classList.remove("hidden");
        }

        showGameComplete(timeElapsed) {
          document
            .getElementById("gameCompletePopup")
            .classList.remove("hidden");
        }

        showGameOver(currentTime) {
          const popup = document.getElementById("gameOverPopup");
          const finalTimeDisplay = document.getElementById("finalTimeDisplay");
          finalTimeDisplay.textContent = `Time: ${currentTime.toFixed(1)}s`;
          popup.classList.remove("hidden");
        }

        reset() {
          this.playerPos = { x: 0, y: 0 };
          this.startTime = null;
          clearInterval(this.timerInterval);
          document.getElementById("timer").textContent = "Time: 0s";
          document.getElementById("winPopup").classList.add("hidden");
          document.getElementById("gameCompletePopup").classList.add("hidden");
          document.getElementById("gameOverPopup").classList.add("hidden");
          this.initializeMaze();
          this.generateMaze(0, 0);
          this.drawMaze();
        }

        start() {
          this.reset();
          this.startTime = Date.now();
          this.timerInterval = setInterval(() => {
            const currentTime = (Date.now() - this.startTime) / 1000;
            const timeLeft = Math.max(0, this.timeLimit - currentTime);
            document.getElementById("timer").textContent =
              `Time: ${timeLeft.toFixed(1)}s`;

            if (timeLeft <= 0) {
              clearInterval(this.timerInterval);
              this.showGameOver(this.timeLimit);
            }
          }, 100);
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        const canvas = document.getElementById("mazeCanvas");
        const game = new MazeGame(canvas);
        game.drawMaze();

        document
          .getElementById("startGame")
          .addEventListener("click", () => game.start());
      });
    </script>
  </body>
</html>
