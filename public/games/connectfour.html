<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect Four Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      :root { --primary-bg: #e0e5ec; --player1-color: #ff6b7d; --player2-color: #4ecdc4; --board-bg: #e8edf5; }
      body { font-family: "Poppins", sans-serif; background: var(--primary-bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-x: hidden; }
      .game-header { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1200px; margin-bottom: 30px; }
      .game-board { background: var(--board-bg); padding: 30px; border-radius: 32px; box-shadow: 9px 9px 18px #c5d0e0, -9px -9px 18px #ffffff; }
      .board-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(6, 1fr); gap: 12px; width: 420px; height: 360px; }
      .cell { width: 48px; height: 48px; border-radius: 50%; background: var(--board-bg); cursor: pointer; position: relative; box-shadow: inset 8px 8px 16px #c5d0e0, inset -8px -8px 16px #ffffff; }
      .piece { width: 40px; height: 40px; border-radius: 50%; position: absolute; top: 4px; left: 4px; animation: dropPiece 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
      .piece.player1 { background: radial-gradient(circle at 30% 30%, #ff8a9b, var(--player1-color), #e53e3e); }
      .piece.player2 { background: radial-gradient(circle at 30% 30%, #7fdbda, var(--player2-color), #319795); }
      @keyframes dropPiece { 0% { transform: translateY(-400px); opacity: 0.8; } 100% { transform: translateY(0); opacity: 1; } }
      .popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
      .popup-overlay.active { opacity: 1; visibility: visible; }
      .popup { background: white; padding: 2.5rem; border-radius: 1rem; text-align: center; max-width: 400px; width: 90%; }
      .copyright { position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center; font-size: 12px; color: #6b7280; }
    </style>
  </head>
  <body>
    <div class="game-header"><h1>Connect 4</h1><button onclick="location.reload()">Restart</button></div>
    <div class="game-board"><div class="board-grid" id="gameBoard"></div></div>
    <div class="copyright">© SGS Coaching</div>
    <div id="win-popup" class="popup-overlay"><div class="popup"><h2 id="win-message"></h2><button onclick="location.reload()">Play Again</button></div></div>
    <script>
      class ConnectFour {
        constructor() {
          this.board = Array(6).fill().map(() => Array(7).fill(0));
          this.currentPlayer = 1; this.gameOver = false;
          this.init();
        }
        init() {
          const board = document.getElementById("gameBoard");
          for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 7; c++) {
              const cell = document.createElement("div"); cell.className = "cell";
              cell.onclick = () => this.makeMove(c); board.appendChild(cell);
            }
          }
        }
        makeMove(c) {
          if (this.gameOver) return;
          let r = -1; for (let i = 5; i >= 0; i--) { if (this.board[i][c] === 0) { r = i; break; } }
          if (r === -1) return;
          this.board[r][c] = this.currentPlayer;
          const cell = document.querySelectorAll(".cell")[r * 7 + c];
          const piece = document.createElement("div"); piece.className = `piece player${this.currentPlayer}`;
          cell.appendChild(piece);
          if (this.checkWin(r, c)) {
            this.gameOver = true; document.getElementById("win-message").textContent = `Player ${this.currentPlayer} Wins!`;
            document.getElementById("win-popup").classList.add("active");
          } else { this.currentPlayer = this.currentPlayer === 1 ? 2 : 1; }
        }
        checkWin(r, c) {
          const p = this.board[r][c], dirs = [[0, 1], [1, 0], [1, 1], [1, -1]];
          for (const [dr, dc] of dirs) {
            let count = 1;
            for (let i = 1; i < 4; i++) { const nr = r + dr * i, nc = c + dc * i; if (nr >= 0 && nr < 6 && nc >= 0 && nc < 7 && this.board[nr][nc] === p) count++; else break; }
            for (let i = 1; i < 4; i++) { const nr = r - dr * i, nc = c - dc * i; if (nr >= 0 && nr < 6 && nc >= 0 && nc < 7 && this.board[nr][nc] === p) count++; else break; }
            if (count >= 4) return true;
          }
          return false;
        }
      }
      new ConnectFour();
    </script>
  </body>
</html>
