<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Tic Tac Toe Game</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      html,
      body {
        height: 100%;
        overflow: hidden; /* To prevent scrollbars */
      }

      body {
        display: flex;
        align-items: center; /* Vertically centers */
        justify-content: center; /* Horizontally centers */
        padding: 20px;
        color: white;
        background: #f0f2f5; /* Added a light background for better visibility */
        min-height: 100vh;
      }

      .game-box {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        border-radius: 1rem;
        width: 90vw; /* Adjusted width as requested */
        max-width: 500px; /* Added max-width for larger screens */
        padding: 2rem;
        box-shadow:
          0 20px 25px -5px rgba(0, 0, 0, 0.1),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);
        position: relative;
      }

      .header {
        text-align: center;
        margin-bottom: 2rem;
      }

      h1 {
        font-size: 2.25rem;
        font-weight: 700;
        color: #1f2937;
        margin-bottom: 1rem;
      }

      .scores {
        display: flex;
        justify-content: center;
        gap: 2rem;
        font-size: 1.125rem;
      }

      .score {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 600;
      }

      .x-icon {
        color: #6366f1;
      }

      .o-icon {
        color: #ec4899;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.75rem;
        margin-bottom: 2rem;
      }

      .cell {
        aspect-ratio: 1;
        background: white;
        border: none;
        border-radius: 0.5rem;
        font-size: 2.25rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow:
          #6f0ff9b0 0px 2px 4px,
          rgba(0, 0, 0, 0.3) 0px 7px 13px -3px,
          #6f0ff952 0px -3px 0px inset;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .cell:not(:disabled):hover {
        background: #f9fafb;
      }

      .cell:not(:disabled):active {
        transform: scale(0.95);
      }

      .cell:disabled {
        cursor: not-allowed;
        box-shadow:
          0 4px 6px -1px #6f0ff936,
          0 2px 4px -1px #6f0ff9bd;
      }

      .cell svg {
        width: 3rem;
        height: 3rem;
      }

      .status {
        text-align: center;
      }

      .text-xl {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: #1f2937;
      }

      .winner-message {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        color: #1f2937;
      }

      .winner-message svg {
        color: #eab308;
      }

      .button {
        background-color: #6f0ff9;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 9999px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        transition: opacity 0.2s;
        font-size: 1rem;
        margin: 0 auto;
      }

      .button:hover {
        opacity: 0.9;
      }

      .button.green {
        background: linear-gradient(to right, #22c55e, #10b981);
      }

      .hidden {
        display: none;
      }

      /* Popup Styles */
      .popup-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
      }

      .popup-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .popup {
        background: white;
        padding: 2.5rem;
        border-radius: 1rem;
        text-align: center;
        transform: scale(0.9);
        transition: transform 0.3s ease;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        max-width: 400px;
        width: 90%;
      }

      .popup-overlay.active .popup {
        transform: scale(1);
      }

      .popup h2 {
        font-size: 2.5rem;
        color: #1f2937;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
      }

      .popup .winner-icon {
        font-size: 3rem;
        font-weight: bold;
      }

      .popup .x-winner {
        color: #6366f1;
      }

      .popup .o-winner {
        color: #ec4899;
      }

      .popup h2 svg {
        color: #eab308;
      }

      .popup .button {
        font-size: 1.1rem;
        padding: 0.75rem 2rem;
      }

      .popup p {
        font-size: 1.25rem;
        color: #4b5563;
        margin-bottom: 1.5rem;
      }

      .popup .buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
      }

      .popup .button {
        min-width: 120px;
      }

      @media (max-width: 768px) {
        .game-box {
          padding: 1.5rem;
        }

        .board {
          gap: 0.5rem;
        }

        .cell {
          font-size: 1.75rem;
        }

        .popup {
          padding: 1.5rem;
        }
      }
      /* Fix Blogger container layout */
      html,
      body,
      .page_body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
      }

      /* Make sure Blogger wrapper doesn't override */
      .page_body .centered {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        min-height: 100vh !important;
      }

      /* Keep .game-box centered */
      .game-box {
        margin: auto;
      }
      
      .copyright {
        position: absolute;
        bottom: 10px;
        left: 0;
        width: 100%;
        text-align: center;
        font-size: 12px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="game-box">
      <div class="header">
        <h1>Tic Tac Toe</h1>
        <div class="scores">
          <div class="score">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="x-icon"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
            <span id="score-x">0</span>
          </div>
          <div class="score">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="o-icon"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
            </svg>
            <span id="score-o">0</span>
          </div>
        </div>
      </div>

      <div class="board">
        <button class="cell" data-index="0"></button>
        <button class="cell" data-index="1"></button>
        <button class="cell" data-index="2"></button>
        <button class="cell" data-index="3"></button>
        <button class="cell" data-index="4"></button>
        <button class="cell" data-index="5"></button>
        <button class="cell" data-index="6"></button>
        <button class="cell" data-index="7"></button>
        <button class="cell" data-index="8"></button>
      </div>

      <div class="status">
        <div id="status-message" class="text-xl">Player X's Turn</div>
        <div id="winner-message" class="winner-message hidden"></div>
        <button id="reset-btn" class="button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            <path d="M3 3v5h5" />
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
            <path d="M16 16h5v5" />
          </svg>
          Reset Game
        </button>
      </div>
    </div>
    <div class="copyright">© SGS Coaching</div>

    <!-- Final Round Popup -->
    <div id="final-round-popup" class="popup-overlay">
      <div class="popup">
        <h2>Final Round!</h2>
        <p>This is the final round. Winner takes all!</p>
        <div class="buttons">
          <button id="start-final-round" class="button">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            Start Final Round
          </button>
        </div>
      </div>
    </div>

    <!-- Game Win Popup -->
    <div id="game-win-popup" class="popup-overlay">
      <div class="popup">
        <h2>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5h3.5" />
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5h-3.5" />
            <path d="M4 22h16" />
            <path
              d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"
            />
            <path
              d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"
            />
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" />
          </svg>
          Winner!
        </h2>
        <p id="win-message" class="text-xl"></p>
        <div class="buttons">
          <button id="restart-game" class="button">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
              <path d="M3 3v5h5" />
              <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
              <path d="M16 16h5v5" />
            </svg>
            Play Again
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
      let currentPlayer = "X";
      let board = Array(9).fill(null);
      let winner = null;
      let scores = { X: 0, O: 0 };
      let showingCelebration = false;

      const winningCombinations = [
        [0, 1, 2],
        [3, 4, 5],
        [6, 7, 8], // Rows
        [0, 3, 6],
        [1, 4, 7],
        [2, 5, 8], // Columns
        [0, 4, 8],
        [2, 4, 6], // Diagonals
      ];

      function createPlayerIcon(player) {
        if (player === "X") {
          return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="x-icon"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>';
        } else {
          return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="o-icon"><circle cx="12" cy="12" r="10"/></svg>';
        }
      }

      function checkWinner() {
        for (const combo of winningCombinations) {
          const [a, b, c] = combo;
          if (board[a] && board[a] === board[b] && board[a] === board[c]) {
            return board[a];
          }
        }
        return board.every((cell) => cell !== null) ? "Draw" : null;
      }

      function triggerCelebration() {
        const duration = 3 * 1000;
        const end = Date.now() + duration;
        const colors = [
          "#FF0000",
          "#00FF00",
          "#0000FF",
          "#FFFF00",
          "#FF00FF",
          "#00FFFF",
        ];

        (function frame() {
          confetti({
            particleCount: 7,
            angle: 60,
            spread: 55,
            origin: { x: 0 },
            colors: colors,
          });
          confetti({
            particleCount: 7,
            angle: 120,
            spread: 55,
            origin: { x: 1 },
            colors: colors,
          });

          if (Date.now() < end) {
            requestAnimationFrame(frame);
          }
        })();
      }

      function showFinalRoundPopup() {
        const popup = document.getElementById("final-round-popup");
        popup.classList.add("active");
      }

      function hideFinalRoundPopup() {
        const popup = document.getElementById("final-round-popup");
        popup.classList.remove("active");
      }

      function showGameWinPopup(winner) {
        const popup = document.getElementById("game-win-popup");
        const message = document.getElementById("win-message");
        const winnerIcon =
          winner === "X"
            ? '<span class="winner-icon x-winner">X</span>'
            : '<span class="winner-icon o-winner">O</span>';
        message.innerHTML = `${winnerIcon} is the Winner!`;
        popup.classList.add("active");
        triggerCelebration();
      }

      function hideGameWinPopup() {
        const popup = document.getElementById("game-win-popup");
        popup.classList.remove("active");
        resetFullGame();
      }

      function updateUI() {
        // Update scores
        document.getElementById("score-x").textContent = scores.X;
        document.getElementById("score-o").textContent = scores.O;

        // Update board
        document.querySelectorAll(".cell").forEach((cell, index) => {
          cell.innerHTML = board[index] ? createPlayerIcon(board[index]) : "";
          cell.disabled = !!board[index] || !!winner || showingCelebration;
        });

        // Update status message
        const statusMessage = document.getElementById("status-message");
        const winnerMessage = document.getElementById("winner-message");

        if (showingCelebration) {
          statusMessage.classList.add("hidden");
          winnerMessage.classList.remove("hidden");
          winnerMessage.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5h3.5"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5h-3.5"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                Player ${scores.X === 2 ? "X" : "O"} Wins the Tournament!
            `;
        } else if (winner) {
          statusMessage.classList.add("hidden");
          winnerMessage.classList.remove("hidden");
          if (winner === "Draw") {
            winnerMessage.textContent = "It's a Draw!";
            setTimeout(() => {
              resetGame();
            }, 1500);
          } else {
            winnerMessage.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5h3.5"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5h-3.5"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                    Player ${winner} Wins!
                `;

            setTimeout(() => {
              if (
                (scores.X === 1 && winner === "X") ||
                (scores.O === 1 && winner === "O")
              ) {
                showFinalRoundPopup();
              } else {
                showGameWinPopup(winner);
              }
            }, 1000);
          }
        } else {
          statusMessage.classList.remove("hidden");
          winnerMessage.classList.add("hidden");
          statusMessage.textContent = `Player ${currentPlayer}'s Turn`;
        }
      }

      function handleCellClick(index) {
        if (board[index] || winner || showingCelebration) return;

        board[index] = currentPlayer;
        winner = checkWinner();

        if (winner && winner !== "Draw") {
          scores[winner]++;
          if (scores[winner] === 2) {
            showingCelebration = true;
            showGameWinPopup(winner);
          }
        }

        currentPlayer = currentPlayer === "X" ? "O" : "X";
        updateUI();
      }

      function resetGame() {
        board = Array(9).fill(null);
        winner = null;
        currentPlayer = "X";
        updateUI();
      }

      function resetFullGame() {
        resetGame();
        scores = { X: 0, O: 0 };
        showingCelebration = false;
        updateUI();
      }

      // Event Listeners
      document.querySelectorAll(".cell").forEach((cell) => {
        cell.addEventListener("click", () =>
          handleCellClick(parseInt(cell.dataset.index)),
        );
      });

      document
        .getElementById("start-final-round")
        .addEventListener("click", () => {
          hideFinalRoundPopup();
          resetGame();
        });

      document.getElementById("restart-game").addEventListener("click", () => {
        hideGameWinPopup();
        resetGame();
      });

      document.getElementById("reset-btn").addEventListener("click", () => {
        resetFullGame();
      });

      // Initialize UI
      updateUI();
    </script>
  </body>
</html>
