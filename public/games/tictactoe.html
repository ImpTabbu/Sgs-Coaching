<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Tic Tac Toe Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
      body { display: flex; align-items: center; justify-content: center; padding: 20px; color: white; background: #f0f2f5; min-height: 100vh; }
      .game-box { background: rgba(255, 255, 255, 0.9); border-radius: 1rem; width: 90vw; max-width: 500px; padding: 2rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
      .header { text-align: center; margin-bottom: 2rem; }
      h1 { font-size: 2.25rem; font-weight: 700; color: #1f2937; }
      .scores { display: flex; justify-content: center; gap: 2rem; font-size: 1.125rem; }
      .score { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; }
      .x-icon { color: #6366f1; } .o-icon { color: #ec4899; }
      .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 2rem; }
      .cell { aspect-ratio: 1; background: white; border: none; border-radius: 0.5rem; font-size: 2.25rem; font-weight: 700; cursor: pointer; box-shadow: #6f0ff9b0 0px 2px 4px, rgba(0, 0, 0, 0.3) 0px 7px 13px -3px, #6f0ff952 0px -3px 0px inset; display: flex; align-items: center; justify-content: center; }
      .button { background-color: #6f0ff9; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 9999px; font-weight: 600; cursor: pointer; }
      .popup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
      .popup-overlay.active { opacity: 1; visibility: visible; }
      .popup { background: white; padding: 2.5rem; border-radius: 1rem; text-align: center; max-width: 400px; width: 90%; }
      .copyright { position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center; font-size: 12px; color: #6b7280; }
    </style>
  </head>
  <body>
    <div class="game-box">
      <div class="header"><h1>Tic Tac Toe</h1><div class="scores"><div class="score"><span id="score-x">0</span></div><div class="score"><span id="score-o">0</span></div></div></div>
      <div class="board" id="board"></div>
      <div class="status"><button id="reset-btn" class="button">Reset Game</button></div>
    </div>
    <div class="copyright">© SGS Coaching</div>
    <div id="win-popup" class="popup-overlay"><div class="popup"><h2 id="win-message"></h2><button onclick="location.reload()">Play Again</button></div></div>
    <script>
      let currentPlayer = "X", board = Array(9).fill(null), scores = { X: 0, O: 0 };
      const boardEl = document.getElementById("board");
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement("button"); cell.className = "cell";
        cell.onclick = () => {
          if (board[i] || checkWinner()) return;
          board[i] = currentPlayer; cell.textContent = currentPlayer;
          const winner = checkWinner();
          if (winner) {
            if (winner !== "Draw") scores[winner]++;
            document.getElementById("win-message").textContent = winner === "Draw" ? "It's a Draw!" : `Player ${winner} Wins!`;
            document.getElementById("win-popup").classList.add("active");
          } else { currentPlayer = currentPlayer === "X" ? "O" : "X"; }
        };
        boardEl.appendChild(cell);
      }
      function checkWinner() {
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for (const [a,b,c] of wins) if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
        return board.every(c => c !== null) ? "Draw" : null;
      }
      document.getElementById("reset-btn").onclick = () => location.reload();
    </script>
  </body>
</html>
