<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2048 Neon Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Arial", sans-serif; }
      body { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; background: #ffffff; text-align: center; overflow: hidden; }
      h1 { font-size: 2.5rem; color: #700ff9b0; margin-bottom: 20px; }
      .header-container { display: flex; justify-content: space-between; align-items: center; width: 90vw; max-width: 400px; margin-bottom: 20px; }
      #score, #high-score { font-size: 1.5rem; font-weight: 600; color: #700ff9b0; }
      .game-container { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 10px; background-color: #700ff9b0; border-radius: 10px; padding: 10px; width: 90vw; height: 90vw; max-width: 400px; max-height: 400px; touch-action: none; }
      .tile, .empty { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: bold; border-radius: 10px; color: #fff; }
      .empty { background-color: #fff; }
      .tile[data-value="2"] { background: #ff5722; } .tile[data-value="4"] { background: #009688; } .tile[data-value="8"] { background: #3f51b5; }
      .tile[data-value="16"] { background: #8bc34a; } .tile[data-value="32"] { background: #ffc107; } .tile[data-value="64"] { background: #ff0000; }
      .icon-button { background-color: #700ff9b0; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
      .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; flex-direction: column; color: white; z-index: 100; }
      .copyright { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 12px; color: #6b7280; }
    </style>
  </head>
  <body>
    <h1>2048 Neon</h1>
    <div class="header-container">
      <div id="high-score">Best: 0</div>
      <div id="score">Score: 0</div>
      <button id="restart" class="icon-button"><i class="fas fa-redo-alt"></i></button>
    </div>
    <div class="game-container" id="game-container"></div>
    <div class="copyright">© SGS Coaching</div>
    <div id="modal" class="modal"><h2 id="modal-message"></h2><button onclick="location.reload()">Play Again</button></div>
    <script>
      const gridContainer = document.getElementById("game-container");
      const scoreDisplay = document.getElementById("score");
      const highScoreDisplay = document.getElementById("high-score");
      let grid = Array(4).fill().map(() => Array(4).fill(0)), score = 0, highScore = localStorage.getItem("highScore") || 0;
      highScoreDisplay.textContent = `Best: ${highScore}`;
      function createGrid() {
        gridContainer.innerHTML = "";
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            const t = document.createElement("div");
            if (grid[r][c] === 0) t.className = "empty";
            else { t.className = "tile"; t.setAttribute("data-value", grid[r][c]); t.textContent = grid[r][c]; }
            gridContainer.appendChild(t);
          }
        }
        if (score > highScore) { highScore = score; localStorage.setItem("highScore", highScore); highScoreDisplay.textContent = `Best: ${highScore}`; }
      }
      function addTile() {
        const empty = [];
        for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (grid[r][c] === 0) empty.push({r, c});
        if (empty.length) { const {r, c} = empty[Math.floor(Math.random() * empty.length)]; grid[r][c] = Math.random() > 0.1 ? 2 : 4; }
      }
      function slide(row) {
        let n = row.filter(v => v !== 0);
        for (let i = 0; i < n.length - 1; i++) if (n[i] === n[i+1]) { n[i] *= 2; score += n[i]; n[i+1] = 0; }
        n = n.filter(v => v !== 0); while (n.length < 4) n.push(0); return n;
      }
      function move(dir) {
        const old = JSON.stringify(grid);
        if (dir === "up" || dir === "down") grid = grid[0].map((_, c) => grid.map(r => r[c]));
        if (dir === "down" || dir === "right") grid = grid.map(r => r.reverse());
        grid = grid.map(r => slide(r));
        if (dir === "down" || dir === "right") grid = grid.map(r => r.reverse());
        if (dir === "up" || dir === "down") grid = grid[0].map((_, c) => grid.map(r => r[c]));
        if (old !== JSON.stringify(grid)) { addTile(); createGrid(); scoreDisplay.textContent = `Score: ${score}`; }
      }
      document.getElementById("restart").onclick = () => location.reload();
      window.onkeydown = (e) => {
        if (e.key === "ArrowUp") move("up"); if (e.key === "ArrowDown") move("down");
        if (e.key === "ArrowLeft") move("left"); if (e.key === "ArrowRight") move("right");
      };
      let sx, sy;
      gridContainer.ontouchstart = (e) => { sx = e.touches[0].clientX; sy = e.touches[0].clientY; };
      gridContainer.ontouchend = (e) => {
        const dx = e.changedTouches[0].clientX - sx, dy = e.changedTouches[0].clientY - sy;
        if (Math.abs(dx) > Math.abs(dy)) { if (Math.abs(dx) > 30) move(dx > 0 ? "right" : "left"); }
        else { if (Math.abs(dy) > 30) move(dy > 0 ? "down" : "up"); }
      };
      addTile(); addTile(); createGrid();
    </script>
  </body>
</html>
