<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tower Blocks Game</title>
    <style>
      @import url("https://fonts.googleapis.com/css?family=Comfortaa:400,700,300|Quattrocento");
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Comfortaa", sans-serif; background-color: #1a1a2e; color: #fff; }
      #game-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
      canvas { display: block; width: 100%; height: 100%; }
      #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
      .header { padding: 20px; display: flex; justify-content: space-between; align-items: flex-start; }
      .score-container { pointer-events: auto; }
      .score-label { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: #e94560; margin-bottom: 5px; }
      #score { font-size: 48px; font-weight: 700; line-height: 1; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5); }
      .btn { background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 10px 20px; border-radius: 30px; font-family: "Comfortaa", sans-serif; font-weight: 700; cursor: pointer; backdrop-filter: blur(5px); transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; }
      .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(26, 26, 46, 0.85); backdrop-filter: blur(8px); z-index: 20; pointer-events: auto; transition: opacity 0.3s ease; }
      .screen.hidden { opacity: 0; pointer-events: none; }
      .title { font-size: 4rem; font-weight: 700; margin-bottom: 10px; text-align: center; background: linear-gradient(45deg, #e94560, #0f3460); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3)); }
      .primary-btn { background: linear-gradient(45deg, #e94560, #ff2e63); border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; box-shadow: 0 10px 20px rgba(233, 69, 96, 0.4); margin-bottom: 20px; }
      .copyright { position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center; font-size: 12px; color: #6b7280; pointer-events: none; z-index: 100; }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="canvas-container"></div>
      <div id="ui-layer">
        <div class="header"><div class="score-container"><div class="score-label">Score</div><div id="score">0</div></div><div class="controls"><button id="pause-btn" class="btn">Pause</button></div></div>
        <div id="instruction" style="position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); font-size: 1.2rem; color: rgba(255,255,255,0.8); text-align: center; pointer-events: none;">Tap or Space to drop block</div>
      </div>
      <div id="start-screen" class="screen"><h1 class="title">Tower Blocks</h1><p style="font-size: 1.2rem; color: #a2a2bd; margin-bottom: 40px; text-align: center;">Build the highest tower possible</p><button id="start-btn" class="btn primary-btn">Play Now</button></div>
      <div id="game-over-screen" class="screen hidden"><h1 class="title">Game Over</h1><div style="display: flex; gap: 30px; margin-bottom: 40px;"><div style="text-align: center; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); min-width: 120px;"><div id="final-score" style="font-size: 36px; font-weight: 700; color: #fff; margin-bottom: 5px;">0</div><div style="font-size: 12px; color: #a2a2bd; text-transform: uppercase; letter-spacing: 1px;">Score</div></div></div><button id="restart-btn" class="btn primary-btn">Play Again</button></div>
    </div>
    <div class="copyright">© SGS Coaching</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script>
      const config = { blockHeight: 1, blockWidth: 3, blockDepth: 3, cameraDistance: 10, colors: [0xe94560, 0x0f3460, 0x16213e, 0x4ecdc4, 0xffbe0b, 0xff006e, 0x8338ec, 0x3a86ff] };
      const state = { status: 'start', score: 0, blocks: [], movingBlock: null, direction: 'x', speed: 0.05, colorIndex: 0 };
      let scene, camera, renderer, world;
      function init() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0x1a1a2e); scene.fog = new THREE.Fog(0x1a1a2e, 10, 30);
        const aspect = window.innerWidth / window.innerHeight, d = 5;
        camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 100);
        camera.position.set(config.cameraDistance, config.cameraDistance, config.cameraDistance); camera.lookAt(0, 0, 0);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); dirLight.position.set(10, 20, 10); scene.add(dirLight);
        world = new CANNON.World(); world.gravity.set(0, -10, 0);
        window.addEventListener('resize', () => { const aspect = window.innerWidth / window.innerHeight, d = 5; camera.left = -d * aspect; camera.right = d * aspect; camera.top = d; camera.bottom = -d; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        document.addEventListener('mousedown', handleInput); document.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'BUTTON') { e.preventDefault(); handleInput(); } }, { passive: false });
        document.getElementById('start-btn').onclick = startGame; document.getElementById('restart-btn').onclick = () => location.reload();
        createBase(); update();
      }
      function createBase() {
        const geometry = new THREE.BoxGeometry(config.blockWidth, config.blockHeight * 5, config.blockDepth);
        const mesh = new THREE.Mesh(geometry, new THREE.MeshLambertMaterial({ color: 0x2a2a4a }));
        mesh.position.set(0, -config.blockHeight * 2.5, 0); scene.add(mesh);
        const body = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(config.blockWidth / 2, config.blockHeight * 2.5, config.blockDepth / 2)) });
        body.position.copy(mesh.position); world.addBody(body);
        state.blocks.push({ mesh, body, width: config.blockWidth, depth: config.blockDepth });
      }
      function addBlock() {
        const last = state.blocks[state.blocks.length - 1], y = state.blocks.length * config.blockHeight;
        state.colorIndex = (state.colorIndex + 1) % config.colors.length;
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(last.width, config.blockHeight, last.depth), new THREE.MeshLambertMaterial({ color: config.colors[state.colorIndex] }));
        if (state.direction === 'x') mesh.position.set(last.mesh.position.x - 6, y, last.mesh.position.z); else mesh.position.set(last.mesh.position.x, y, last.mesh.position.z - 6);
        scene.add(mesh); state.movingBlock = { mesh, width: last.width, depth: last.depth, direction: 1 }; state.speed += 0.002;
      }
      function handleInput() { if (state.status === 'playing') placeBlock(); }
      function placeBlock() {
        const current = state.movingBlock, previous = state.blocks[state.blocks.length - 1];
        let overlap, diff;
        if (state.direction === 'x') { diff = current.mesh.position.x - previous.mesh.position.x; overlap = current.width - Math.abs(diff); }
        else { diff = current.mesh.position.z - previous.mesh.position.z; overlap = current.depth - Math.abs(diff); }
        if (overlap <= 0) { state.status = 'gameover'; document.getElementById('final-score').innerText = state.score; document.getElementById('game-over-screen').classList.remove('hidden'); return; }
        if (state.direction === 'x') { current.mesh.scale.x = overlap / current.width; current.mesh.position.x -= diff / 2; current.width = overlap; }
        else { current.mesh.scale.z = overlap / current.depth; current.mesh.position.z -= diff / 2; current.depth = overlap; }
        const body = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(current.width / 2, config.blockHeight / 2, current.depth / 2)) });
        body.position.copy(current.mesh.position); world.addBody(body);
        state.blocks.push({ mesh: current.mesh, body, width: current.width, depth: current.depth });
        state.score++; document.getElementById('score').innerText = state.score;
        camera.position.y += config.blockHeight; camera.lookAt(0, state.score * config.blockHeight, 0);
        state.direction = state.direction === 'x' ? 'z' : 'x'; addBlock();
      }
      function update() {
        if (state.status === 'playing' && state.movingBlock) {
          const axis = state.direction; state.movingBlock.mesh.position[axis] += state.speed * state.movingBlock.direction;
          if (Math.abs(state.movingBlock.mesh.position[axis]) > 8) state.movingBlock.direction *= -1;
        }
        world.step(1 / 60); renderer.render(scene, camera); requestAnimationFrame(update);
      }
      function startGame() { document.getElementById('start-screen').classList.add('hidden'); state.status = 'playing'; addBlock(); }
      init();
    </script>
  </body>
</html>
